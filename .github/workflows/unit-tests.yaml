name: Unit Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'CODEOWNERS'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'CODEOWNERS'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pyyaml google-auth google-cloud-secret-manager boto3 yamllint

      - name: Run unit tests
        run: |
          export PYTHONPATH=scripts
          pytest tests/ -v
